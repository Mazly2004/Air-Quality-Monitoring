[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200

lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
    makuna/Rtc@^2.4.3
    bodmer/TFT_eSPI@^2.5.

    vshymanskyy/TinyGSM @ ^0.11.7
   
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.2

; Build Flags for T-SIM7000G Power Management
build_flags =
    -D TINY_GSM_MODEM_SIM7000
    -D TINY_GSM_RX_BUFFER=1024

    -D USER_SETUP_LOADED=1
    -D RM68140_DRIVER=1
    -D ESP32_PARALLEL=1
    ; Data Pins
    -D TFT_D0=12
    -D TFT_D1=13
    -D TFT_D2=18
    -D TFT_D3=19
    -D TFT_D4=21
    -D TFT_D5=22
    -D TFT_D6=23
    -D TFT_D7=25
    ; Control Pins
    -D TFT_CS=33
    -D TFT_DC=15
    -D TFT_RST=32
    -D TFT_WR=4
    -D TFT_RD=2
    ; Fonts
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1