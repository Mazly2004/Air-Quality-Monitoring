[agent]
  interval = "10s"
  round_interval = true
  debug = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "Ah89PHWEm5j8dIIjAH4cKyQwARelf2dQCa6hbSkJPMxic6Tida_j0adFxAVoA0J3Kdc7CIvFPOMHPTwgascf3Q=="
  organization = "Secondspark"
  bucket = "airquality_research"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  # Matches both legacy (sensors/esp32_01) and new (sensors/indoor/esp32_02) topics
  topics = ["sensors/#"]
  data_format = "json_v2"
  name_override = "sensor_data"
  topic_tag = "topic"

# Parse topic into location + device_id tags
# - sensors/indoor/esp32_02   -> location=indoor,  device_id=esp32_02
# - sensors/outdoor/esp32_01  -> location=outdoor, device_id=esp32_01
# - sensors/esp32_01          -> location=indoor, device_id=esp32_01   (legacy)
[[processors.regex]]
  namepass = ["air_quality"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${1}"
    result_key = "location"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${2}"
    result_key = "device_id"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^sensors/([^/]+)$"
    replacement = "${1}"
    result_key = "device_id"

# Default location to "unknown" for legacy flat topics
[[processors.defaults]]
  namepass = ["air_quality"]
  [processors.defaults.tags]
    location = "unknown"


  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
