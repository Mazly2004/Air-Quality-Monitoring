# Telegraf Configuration for TimescaleDB Research Server
# Subscribes to BOTH MQTT brokers (primary + backup) for continuous data collection

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "timescaledb-research-server"
  omit_hostname = false

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Subscribe to BOTH MQTT brokers for high availability
[[inputs.mqtt_consumer]]
  ## MQTT broker URLs - subscribes to both primary and backup
  servers = [
    "${MQTT_PRIMARY}",   # Raspberry Pi 1 (Primary)
    "${MQTT_BACKUP}"     # Raspberry Pi 2 (Backup)
  ]
  
  ## Topics to subscribe to
  topics = [
    "sensors/#"
  ]
  
  ## QoS policy (0, 1, or 2)
  qos = 1
  
  ## Connection timeout
  connection_timeout = "30s"
  
  ## Persistent session
  persistent_session = false
  
  ## Client ID (unique for this Telegraf instance)
  client_id = "telegraf_timescaledb_research"
  
  ## Username and password (if MQTT requires authentication)
  # username = "mqtt_user"
  # password = "mqtt_password"
  
  ## Data format
  data_format = "json"
  
  ## Tag the data with which broker it came from
  [inputs.mqtt_consumer.tags]
    database = "timescaledb"
    deployment = "research"

###############################################################################
#                           PROCESSOR PLUGINS                                 #
###############################################################################

# Add broker identification tag
[[processors.enum]]
  [[processors.enum.mapping]]
    ## Tag to map
    tag = "broker"
    [processors.enum.mapping.value_mappings]
      "${MQTT_PRIMARY}" = "primary"
      "${MQTT_BACKUP}" = "backup"

# Add timestamp if not present
[[processors.date]]
  field_key = "timestamp"
  date_format = "unix"
  timezone = "UTC"

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Write to TimescaleDB (PostgreSQL)
[[outputs.postgresql]]
  ## PostgreSQL connection string
  connection = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
  
  ## Schema to create tables in
  schema = "public"
  
  ## Create tables if they don't exist
  create_tables = true
  
  ## Table template - uses TimescaleDB hypertable created in init.sql
  table_template = '''
    CREATE TABLE IF NOT EXISTS {TABLE}(
      time TIMESTAMPTZ NOT NULL,
      device_id TEXT NOT NULL,
      pm25 DOUBLE PRECISION,
      pm10 DOUBLE PRECISION,
      co2 DOUBLE PRECISION,
      tvoc DOUBLE PRECISION,
      temperature DOUBLE PRECISION,
      humidity DOUBLE PRECISION,
      hcho DOUBLE PRECISION,
      mqtt_broker TEXT,
      PRIMARY KEY (time, device_id)
    );
  '''
  
  ## Tags to use as primary key
  tags_as_primary_keys = ["device_id"]
  
  ## Timestamp column name
  timestamp_column = "time"
  
  ## Handle conflicts (duplicates from both brokers)
  ## ON CONFLICT DO NOTHING prevents duplicate errors
  conflict_action = "ON CONFLICT (time, device_id) DO NOTHING"

# Optional: Also output to file for debugging
[[outputs.file]]
  files = ["/tmp/telegraf_timescaledb_debug.log"]
  rotation_max_size = "10MB"
  rotation_max_archives = 3
  data_format = "json"
  json_timestamp_units = "1s"

###############################################################################
#                         SERVICE INPUT PLUGINS                               #
###############################################################################

# Monitor Telegraf's own performance
[[inputs.internal]]
  collect_memstats = true

# Monitor PostgreSQL/TimescaleDB performance
[[inputs.postgresql]]
  address = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
  
  ## Queries to monitor database performance
  [[inputs.postgresql.query]]
    sqlquery = "SELECT COUNT(*) as total_records FROM sensor_data"
    version = 100
    measurement = "timescaledb_records"
  
  [[inputs.postgresql.query]]
    sqlquery = "SELECT pg_database_size('${PGDATABASE}') as db_size_bytes"
    version = 100
    measurement = "timescaledb_size"

# Write performance metrics to the database
[[outputs.postgresql]]
  connection = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
  schema = "public"
  
  ## Only write internal metrics
  namepass = ["internal_*", "timescaledb_*", "postgresql"]
  
  ## Store in performance metrics table
  table_template = "db_performance_metrics"
