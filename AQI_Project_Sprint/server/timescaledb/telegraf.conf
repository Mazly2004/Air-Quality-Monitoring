# Telegraf config for the TimescaleDB research stack.
# - Subscribes to BOTH MQTT brokers (primary + backup) for HA.
# - Parses flat JSON published by ESP32 firmware.
# - Extracts location + device_id from the MQTT topic.
# - Writes rows into the `sensor_data` hypertable created by init.sql.

[agent]
  interval              = "10s"
  round_interval        = true
  metric_batch_size     = 1000
  metric_buffer_limit   = 10000
  collection_jitter     = "0s"
  flush_interval        = "10s"
  flush_jitter          = "0s"
  precision             = ""
  hostname              = "timescaledb-research-server"
  omit_hostname         = false

###############################################################################
# INPUT: MQTT
###############################################################################
[[inputs.mqtt_consumer]]
  # NOTE: backup broker (${MQTT_BACKUP}) temporarily disabled because the
  # mqtt_consumer input refuses to start if ANY listed server is unreachable.
  # Re-add it to this list once its IP is known good.
  servers = [
    "${MQTT_PRIMARY}",
  ]

  topics             = ["sensors/#"]
  qos                = 1
  connection_timeout = "30s"
  persistent_session = false
  client_id          = "telegraf_timescaledb_research"

  name_override = "sensor_data"
  topic_tag     = "topic"
  data_format   = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "pm1_0"
      rename   = "pm1"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "pm25"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "pm10"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "co2"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "tvoc"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "temp"
      rename   = "temperature"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "hum"
      rename   = "humidity"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "hcho"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "co"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "o3"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "no2"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "heaviside_pm25"
      type     = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "mad_spike_pm25"
      type     = "int"
      optional = true

  [inputs.mqtt_consumer.tags]
    database   = "timescaledb"
    deployment = "research"

###############################################################################
# PROCESSORS: extract location + device_id from the topic
###############################################################################
# sensors/indoor/<id>   -> location=indoor,  device_id=<id>
# sensors/outdoor/<id>  -> location=outdoor, device_id=<id>
# sensors/<id>          -> device_id=<id>    (location defaulted below)
[[processors.regex]]
  namepass = ["sensor_data"]

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${1}"
    result_key  = "location"

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${2}"
    result_key  = "device_id"

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/([^/]+)$"
    replacement = "${1}"
    result_key  = "device_id"

[[processors.defaults]]
  namepass = ["sensor_data"]
  [processors.defaults.tags]
    location = "unknown"

###############################################################################
# OUTPUT: TimescaleDB
###############################################################################
# Writes into the pre-existing `sensor_data` hypertable. Tags become columns
# (device_id, location, mqtt_broker, etc.). The plugin auto-adds new columns
# if a field appears that doesn't exist yet.
[[outputs.postgresql]]
  connection = "host=${PGHOST} port=${PGPORT} user=${PGUSER} password=${PGPASSWORD} dbname=${PGDATABASE} sslmode=disable"
  schema     = "public"
  namepass   = ["sensor_data"]

  # Map tags to dedicated TEXT columns instead of JSON
  tags_as_foreign_keys = false
  tags_as_jsonb        = false
  fields_as_jsonb      = false

###############################################################################
# DEBUG: also append to a local file (helps verify parsing)
###############################################################################
[[outputs.file]]
  files                 = ["/tmp/telegraf_timescaledb_debug.log"]
  rotation_max_size     = "10MB"
  rotation_max_archives = 3
  data_format           = "json"
  json_timestamp_units  = "1s"
  namepass              = ["sensor_data"]

###############################################################################
# SERVICE INPUTS: Telegraf self-metrics
###############################################################################
[[inputs.internal]]
  collect_memstats = true
