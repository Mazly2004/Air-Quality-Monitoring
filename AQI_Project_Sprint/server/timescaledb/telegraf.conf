# Telegraf Configuration for TimescaleDB Research Server
# Subscribes to BOTH MQTT brokers (primary + backup) and writes to the
# `sensor_data` hypertable created by init.sql.

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "timescaledb-research-server"
  omit_hostname = false

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Subscribe to BOTH MQTT brokers for high availability.
# Topic conventions accepted:
#   sensors/{indoor|outdoor}/{device_id}    (preferred)
#   sensors/{device_id}                     (legacy, mapped to location=unknown)
[[inputs.mqtt_consumer]]
  servers = [
    "${MQTT_PRIMARY}",   # Raspberry Pi 1 (Primary)
    "${MQTT_BACKUP}"     # Raspberry Pi 2 (Backup)
  ]

  topics             = ["sensors/#"]
  qos                = 1
  connection_timeout = "30s"
  persistent_session = false
  client_id          = "telegraf_timescaledb_research"

  ## All measurements from this input become rows in `sensor_data`
  name_override = "sensor_data"
  topic_tag     = "topic"

  ## Parse JSON payload (flat schema published by both indoor and outdoor firmware)
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm1_0"
      rename = "pm1"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm25"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm10"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "co2"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "tvoc"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temp"
      rename = "temperature"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "hum"
      rename = "humidity"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "hcho"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "co"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "o3"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "no2"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "heaviside_pm25"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mad_spike_pm25"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm25_aqi"
      type = "float"
      optional = true

  [inputs.mqtt_consumer.tags]
    database   = "timescaledb"
    deployment = "research"

###############################################################################
#                           PROCESSOR PLUGINS                                 #
###############################################################################

# Extract location + device_id from the MQTT topic.
# Three patterns, evaluated in order:
#   sensors/indoor/<id>   -> location=indoor,  device_id=<id>
#   sensors/outdoor/<id>  -> location=outdoor, device_id=<id>
#   sensors/<id>          -> device_id=<id>    (location defaulted below)
[[processors.regex]]
  namepass = ["sensor_data"]

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${1}"
    result_key  = "location"

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/(indoor|outdoor)/([^/]+)$"
    replacement = "${2}"
    result_key  = "device_id"

  [[processors.regex.tags]]
    key         = "topic"
    pattern     = "^sensors/([^/]+)$"
    replacement = "${1}"
    result_key  = "device_id"

# Default location for legacy flat topics that didn't match indoor/outdoor
[[processors.defaults]]
  namepass = ["sensor_data"]
  [processors.defaults.tags]
    location = "unknown"

# Tag rows with which broker they came from
[[processors.enum]]
  namepass = ["sensor_data"]
  [[processors.enum.mapping]]
    tag = "server"
    dest = "mqtt_broker"
    [processors.enum.mapping.value_mappings]
      "${MQTT_PRIMARY}" = "primary"
      "${MQTT_BACKUP}"  = "backup"

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Write sensor_data rows to TimescaleDB (table pre-created by init.sql)
[[outputs.postgresql]]
  connection = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
  schema     = "public"

  ## Don't auto-create — schema is authoritative in init.sql
  create_templates = []
  add_column_templates = []

  ## Only the sensor_data measurement goes here; internal metrics handled below
  namepass = ["sensor_data"]

  ## Map Telegraf tags into table columns
  tags_as_foreign_keys = false
  tags_as_jsonb        = []
  fields_as_jsonb      = []
  tag_columns          = ["device_id", "location", "mqtt_broker"]

  timestamp_column = "time"

  ## Skip duplicate rows (e.g. same metric arriving from both brokers)
  conflict_action = "ON CONFLICT (time, device_id) DO NOTHING"

# Optional: also output to file for debugging
[[outputs.file]]
  files                 = ["/tmp/telegraf_timescaledb_debug.log"]
  rotation_max_size     = "10MB"
  rotation_max_archives = 3
  data_format           = "json"
  json_timestamp_units  = "1s"
  namepass              = ["sensor_data"]

###############################################################################
#                         SERVICE INPUT PLUGINS                               #
###############################################################################

# Monitor Telegraf's own performance
[[inputs.internal]]
  collect_memstats = true

# Monitor PostgreSQL/TimescaleDB performance
[[inputs.postgresql]]
  address = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"

  [[inputs.postgresql.query]]
    sqlquery    = "SELECT COUNT(*) as total_records FROM sensor_data"
    version     = 100
    measurement = "timescaledb_records"

  [[inputs.postgresql.query]]
    sqlquery    = "SELECT pg_database_size('${PGDATABASE}') as db_size_bytes"
    version     = 100
    measurement = "timescaledb_size"

# Write performance metrics to the db_performance_metrics table
[[outputs.postgresql]]
  connection = "postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
  schema     = "public"

  ## Only write internal/perf metrics here
  namepass = ["internal_*", "timescaledb_*", "postgresql"]

  table_template = "db_performance_metrics"
