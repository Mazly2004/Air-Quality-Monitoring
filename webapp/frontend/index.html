<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Air Quality Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#22d3ee;--ok:#10b981;--warn:#f59e0b;--bad:#ef4444}
    body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text)}
    .container{max-width:1100px;margin:32px auto;padding:0 16px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .card{background:rgba(17,24,39,0.85);border:1px solid #1f2937;border-radius:14px;padding:16px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .metric{display:flex;flex-direction:column;gap:6px}
    .label{font-size:12px;color:var(--muted)}
    .value{font-size:28px;font-weight:700}
    .status{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px}
    .chart{height:240px}
    canvas{width:100%;height:100%}
    .footer{margin-top:24px;color:var(--muted);font-size:12px}
    a{color:var(--accent)}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Air Quality Dashboard</h1>
      <div id="conn" class="status">connecting…</div>
    </header>

    <section class="card">
      <div class="grid">
        <div class="metric"><div class="label">PM2.5</div><div class="value" id="pm25">–</div></div>
        <div class="metric"><div class="label">PM10</div><div class="value" id="pm10">–</div></div>
        <div class="metric"><div class="label">CO2</div><div class="value" id="co2">–</div></div>
        <div class="metric"><div class="label">TVOC</div><div class="value" id="tvoc">–</div></div>
        <div class="metric"><div class="label">Temp</div><div class="value" id="temp">–</div></div>
        <div class="metric"><div class="label">Humidity</div><div class="value" id="humidity">–</div></div>
        <div class="metric"><div class="label">HCHO</div><div class="value" id="hcho">–</div></div>
        <div class="metric"><div class="label">Device</div><div class="value" id="device">–</div></div>
      </div>
    </section>

    <section class="card" style="margin-top:16px">
      <h3 style="margin:0 0 8px 0">PM2.5 (last 60)</h3>
      <div class="chart"><canvas id="pmChart"></canvas></div>
    </section>

    <div class="footer">Backend: <a href="/" target="_blank">FastAPI</a> · Frontend served at <code>/app</code></div>
  </div>

<script>
const API_BASE = location.origin;
const wsUrl = (API_BASE.replace('http', 'ws')) + '/ws';
const connEl = document.getElementById('conn');
const els = {
  pm25: document.getElementById('pm25'),
  pm10: document.getElementById('pm10'),
  co2: document.getElementById('co2'),
  tvoc: document.getElementById('tvoc'),
  temp: document.getElementById('temp'),
  humidity: document.getElementById('humidity'),
  hcho: document.getElementById('hcho'),
  device: document.getElementById('device'),
};

let pmData = [];
let labels = [];
let chart;

function setStatus(text, color){
  connEl.textContent = text;
  connEl.style.background = color || 'transparent';
}

function updateUI(d){
  els.pm25.textContent = d.pm25;
  els.pm10.textContent = d.pm10;
  els.co2.textContent = d.co2 + ' ppm';
  els.tvoc.textContent = d.tvoc + ' ppb';
  els.temp.textContent = d.temp_c.toFixed(1) + ' °C';
  els.humidity.textContent = d.humidity.toFixed(1) + ' %';
  els.hcho.textContent = d.hcho + ' µg/m³';
  els.device.textContent = d.device_id;
  pmData.push(d.pm25);
  labels.push(new Date(d.ts*1000).toLocaleTimeString());
  if(pmData.length>60){ pmData.shift(); labels.shift(); }
  chart.update();
}

async function bootstrap(){
  const res = await fetch(API_BASE + '/api/measurements/latest');
  const j = await res.json();
  if(j && j.pm25 !== undefined){ updateUI(j); }
}

function setupChart(){
  const ctx = document.getElementById('pmChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{label: 'PM2.5', data: pmData, borderColor: '#22d3ee'}]
    },
    options: {responsive:true, scales:{y:{beginAtZero:true}}}
  });
}

function connectWS(){
  const ws = new WebSocket(wsUrl);
  ws.onopen = () => setStatus('connected', '#10b981');
  ws.onclose = () => setStatus('disconnected', '#ef4444');
  ws.onerror = () => setStatus('error', '#f59e0b');
  ws.onmessage = (ev)=>{
    const msg = JSON.parse(ev.data);
    if(msg.type==='measurement'){ updateUI(msg.data); }
    if(msg.type==='bootstrap'){ msg.data.forEach(updateUI); }
  };
}

(async function(){
  await bootstrap();
  setupChart();
  connectWS();
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
